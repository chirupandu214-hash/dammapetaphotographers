<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>దమ్మపేట ఫోటోగ్రాఫర్స్ అసోసియేషన్</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">దమ్మపేట అసోసియేషన్</div>
        <ul>
            <li><a href="#" onclick="showSection('dashboard')">డ్యాష్‌బోర్డ్</a></li>
            <li><a href="#" onclick="showSection('members')">సభ్యులు</a></li>
            <li><a href="#" onclick="showSection('fees')">ఫీజులు</a></li>
        </ul>
    </nav>

    <main id="content">
        <section id="dashboard">
            <h2>డ్యాష్‌బోర్డ్</h2>
            <div class="stats">
                <div class="card">మొత్తం సభ్యులు: <span id="count">0</span></div>
            </div>
        </section>

        <section id="members" class="hidden">
            <h2>సభ్యుల వివరాలు</h2>
            <button onclick="addMember()">కొత్త సభ్యుడిని చేర్చండి</button>
            <table id="memberTable">
                <thead><tr><th>పేరు</th><th>మొబైల్</th><th>యాక్షన్</th></tr></thead>
                <tbody id="memberBody"></tbody>
            </table>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
